; NOT HARDWARE VERIFIED.
[platformio]
default_envs = esp32-s3-devkitc-1
core_dir = .pio/core
platforms_dir = .pio/platforms
packages_dir = .pio/packages
cache_dir = .pio/cache

[env:native]
platform = native
test_build_src = yes
build_src_filter =
  +<protocol.cpp>
  +<frame_state.cpp>
build_flags =
  -std=gnu++17

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
extra_scripts =
  pre:scripts/platformio_windows_sandbox.py
lib_deps =
  fastled/FastLED @ ^3.9.15
build_flags =
  -std=gnu++17
build_unflags =
  -std=gnu++11
