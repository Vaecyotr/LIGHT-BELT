# Hold two-strip LED load present while alternating which node changes content.
# Firmware content dedupe should suppress repeated physical writes on the static side.
# NOT HARDWARE VERIFIED.
schema_version: 2

show:
  id: "ws2811-ab-two-node-edge-load-discriminator-60s"
  duration: 60.0
  defaults:
    fade_in: 0.0
    fade_out: 0.0
    blend: "replace"
    min_effect_hold: 0.0
    switch_cooldown: 0.0

  cues:
    - id: "phase-a-strip41-blue-breath"
      start: 5.0
      end: 25.0
      target: {type: "digital_strip", id: "strip_41"}
      effect:
        mode: "fixed"
        id: "breath"
        params: {period: 6.0, min_brightness: 0.20}
      color: &blue {mode: "solid", color: [0.0, 0.0, 0.65]}

    - id: "phase-a-strip42-blue-static"
      start: 5.0
      end: 25.0
      target: {type: "digital_strip", id: "strip_42"}
      effect: {mode: "fixed", id: "static", params: {}}
      color: *blue

    - id: "phase-b-strip41-blue-static"
      start: 30.0
      end: 50.0
      target: {type: "digital_strip", id: "strip_41"}
      effect: {mode: "fixed", id: "static", params: {}}
      color: *blue

    - id: "phase-b-strip42-blue-breath"
      start: 30.0
      end: 50.0
      target: {type: "digital_strip", id: "strip_42"}
      effect:
        mode: "fixed"
        id: "breath"
        params: {period: 6.0, min_brightness: 0.20}
      color: *blue
