        - {time: 186.0, value: 0.7}
        - {time: 191.9, value: 1.0}
        - {time: 193.0, value: 0.35}
        - {time: 199.0, value: 0.7}
        - {time: 204.9, value: 1.0}
        - {time: 206.0, value: 0.35}
        - {time: 212.0, value: 0.7}
        - {time: 217.9, value: 1.0}
        - {time: 219.0, value: 0.35}
        - {time: 225.0, value: 0.7}
        - {time: 230.9, value: 1.0}
        - {time: 232.0, value: 0.35}
        - {time: 238.0, value: 0.7}
        - {time: 243.9, value: 1.0}
        - {time: 245.0, value: 0.35}
        - {time: 251.0, value: 0.7}
        - {time: 256.9, value: 1.0}
        - {time: 258.0, value: 0.35}
        - {time: 264.0, value: 0.7}
        - {time: 269.9, value: 1.0}
        - {time: 272.0, value: 0.0}

  cues:
    # Exact-color anchors. One-second black gaps distinguish latch errors from
    # intended interpolation and make channel-order faults easier to see.
    - id: "anchor-red"
      start: 1.0
      end: 3.0
      target: &both {type: "digital_set", ids: ["strip_41", "strip_42"]}
      effect: {mode: "fixed", id: "static", params: {}}
      color: {mode: "solid", color: [0.65, 0.0, 0.0]}
    - id: "anchor-green"
      start: 4.0
      end: 6.0
      target: *both
      effect: {mode: "fixed", id: "static", params: {}}
      color: {mode: "solid", color: [0.0, 0.65, 0.0]}
    - id: "anchor-blue"
      start: 7.0
      end: 9.0
      target: *both
      effect: {mode: "fixed", id: "static", params: {}}
      color: &blue {mode: "solid", color: [0.0, 0.0, 0.65]}
    - id: "anchor-cyan"
      start: 10.0
      end: 12.0
      target: *both
      effect: {mode: "fixed", id: "static", params: {}}
      color: {mode: "solid", color: [0.0, 0.45, 0.45]}
    - id: "anchor-amber"
      start: 13.0
      end: 15.0
      target: *both
      effect: {mode: "fixed", id: "static", params: {}}
      color: &amber {mode: "solid", color: [0.58, 0.20, 0.0]}
    - id: "anchor-low-blue-repeat"
      start: 16.0
      end: 18.0
      target: *both
      effect: {mode: "fixed", id: "static", params: {}}
      color: {mode: "solid", color: [0.0, 0.0, 0.20]}

    # The same discrete dot traverses the full 30-group path at three speeds.
    - id: "speed-slow-1pps"
      start: 20.0
      end: 26.0
      target: &relay {type: "virtual_path", id: "node2-node8-relay"}
      origin: "start"
      effect: {mode: "fixed", id: "single_dot", params: {speed: 1.0, direction: "forward"}}
      color: *blue
    - id: "speed-medium-3pps"
      start: 27.0
      end: 33.0
      target: *relay
      origin: "start"
      effect: {mode: "fixed", id: "single_dot", params: {speed: 3.0, direction: "forward"}}
      color: *blue
    - id: "speed-fast-6pps"
      start: 34.0
      end: 40.0
      target: *relay
      origin: "start"
      effect: {mode: "fixed", id: "single_dot", params: {speed: 6.0, direction: "forward"}}
      color: *blue
    - id: "cadence-two-state-blue"
      start: 41.0
      end: 49.0
      target: *both
      effect:
        mode: "fixed"
        id: "step_pulse"
        params:
          period: 1.0
          low_color: [0.0, 0.0, 0.20]
          high_color: [0.0, 0.0, 0.65]
      color: {mode: "effect_default"}

    # Complete 17-effect relay. Every cue uses the same authored virtual path.
    - id: "relay-static"
      start: 50.0
      end: 62.0
      target: *relay
      effect:
        mode: "fixed"
        id: "static"
        params:
          color_timeline: &relay_colors
            interpolation: "rgb_linear"
            keyframes:
              - {time: 0.0, color: [0.0, 0.0, 0.65]}
              - {time: 6.0, color: [0.0, 0.45, 0.45]}
              - {time: 11.9, color: [0.58, 0.20, 0.0]}
      color: {mode: "effect_default"}
    - id: "relay-breath"
      start: 63.0
      end: 75.0
      target: *relay
      effect:
        mode: "fixed"
        id: "breath"
        params: {period: 4.0, min_brightness: 0.20, color_timeline: *relay_colors}
      color: {mode: "effect_default"}
    - id: "relay-color-wave"
      start: 76.0
      end: 88.0
      target: *relay
      effect: {mode: "fixed", id: "color_wave", params: {speed: 0.65, width: 0.45, hue_cycle_rate: 0.08}}
      color: {mode: "effect_default"}
    - id: "relay-chase"
      start: 89.0
      end: 101.0
      target: *relay
      origin: "start"
      effect:
        mode: "fixed"
        id: "chase"
        params: {speed: 4.0, width: 2, gap: 5, direction: "forward", trail: 0.20, color_source: "rainbow", beat_boost: 0.0}
      color: {mode: "effect_default"}
    - id: "relay-comet"
      start: 102.0
      end: 114.0
      target: *relay
      origin: "start"
      effect: {mode: "fixed", id: "comet", params: {speed: 4.0, tail_length: 0.30, decay: 0.84}}
      color: {mode: "effect_default"}
    - id: "relay-audio-pulse"
      start: 115.0
      end: 127.0
      target: *relay
      effect:
        mode: "fixed"
        id: "audio_pulse"
        params: {attack: 0.20, release: 0.35, color_timeline: *relay_colors}
      color: {mode: "effect_default"}
    - id: "relay-bass-pulse"
      start: 128.0
      end: 140.0
      target: *relay
      effect:
        mode: "fixed"
        id: "bass_pulse"
        params: {attack: 0.35, release: 0.50, color_timeline: *relay_colors}
      color: {mode: "effect_default"}
    - id: "relay-spectrum"
      start: 141.0
      end: 153.0
      target: *relay
      effect:
        mode: "fixed"
        id: "spectrum"
        params:
          bass_zones: []
          mid_zones: []
          treble_zones: ["__virtual_path__:node2-node8-relay"]
      color: {mode: "effect_default"}
    - id: "relay-video-ambient"
      start: 154.0
      end: 166.0
      target: *relay
      effect: {mode: "fixed", id: "video_ambient", params: {smoothing: 0.20}}
      color: {mode: "effect_default"}
    - id: "relay-video-audio-fusion"
      start: 167.0
      end: 179.0
      target: *relay
      effect:
        mode: "fixed"
        id: "video_audio_fusion"
        params: {video_weight: 0.65, audio_weight: 0.35, bass_boost: 1.20, treble_limit: 0.20}
      color: {mode: "effect_default"}
    - id: "relay-calm"
      start: 180.0
      end: 192.0
      target: *relay
      effect: {mode: "fixed", id: "calm", params: {period: 8.0, color_timeline: *relay_colors}}
      color: {mode: "effect_default"}
    - id: "relay-color-wipe"
      start: 193.0
      end: 205.0
      target: *relay
      origin: "start"
      effect: {mode: "fixed", id: "color_wipe", params: {speed: 3.0, color_timeline: *relay_colors}}
      color: {mode: "effect_default"}
    - id: "relay-twinkle"
      start: 206.0
      end: 218.0
      target: *relay
      effect:
        mode: "fixed"
        id: "twinkle"
        params: {density: 0.40, fade_time: 0.80, color_source: "solid", color_timeline: *relay_colors}
      color: {mode: "effect_default"}
    - id: "relay-demo"
      start: 219.0
      end: 231.0
      target: *relay
      effect:
        mode: "fixed"
        id: "demo"
        params:
          cycle_interval: 2.0
          effects: ["static", "breath", "color_wave", "chase", "comet", "color_wipe"]
      color: *blue
    - id: "relay-step-pulse"
      start: 232.0
      end: 244.0
      target: *relay
      effect:
        mode: "fixed"
        id: "step_pulse"
        params:
          period: 2.0
          low_color: [0.0, 0.0, 0.20]
          high_color: [0.58, 0.20, 0.0]
      color: {mode: "effect_default"}
    - id: "relay-single-dot"
      start: 245.0
      end: 257.0
      target: *relay
      origin: "start"
      effect:
        mode: "fixed"
        id: "single_dot"
        params: {speed: 4.5, direction: "forward", color_timeline: *relay_colors}
      color: {mode: "effect_default"}
    - id: "relay-theater-phase"
      start: 258.0
      end: 270.0
      target: *relay
      origin: "start"
      effect:
        mode: "fixed"
        id: "theater_phase"
        params: {speed: 3.0, color_timeline: *relay_colors}
      color: {mode: "effect_default"}
