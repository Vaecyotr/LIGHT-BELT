# Two-node capability-boundary Show for Node 2 / strip 41 and Node 8 / strip 42.
# Run the 0-50 second deterministic preflight with the 5, 15, and 30 FPS
# Immediate profiles so cadence is the only changed Host configuration value.
# The later effects include frame-sensitive renderers and are a combined
# renderer/transport stress sweep, not a cadence-only A/B. The field firmware
# may deduplicate identical physical writes, so Host and SPI cadence differ.
# NOT HARDWARE VERIFIED.
schema_version: 2

show:
  id: "ws2811-two-node-capability-boundary-272s"
  duration: 272.0
  defaults:
    fade_in: 0.0
    fade_out: 0.0
    blend: "replace"
    min_effect_hold: 0.0
    switch_cooldown: 0.0

  virtual_paths:
    - id: "node2-node8-relay"
      origin: "start"
      targets:
        - {type: "digital_strip", id: "strip_41"}
        - {type: "digital_strip", id: "strip_42"}

  # During every 12-second relay cue, the same continuous effect runs over the
  # 30-group virtual path while emphasis moves from Node 2 to Node 8.
  brightness_tracks:
    - id: "node2-relay-emphasis"
      target: {type: "digital_strip", id: "strip_41"}
      start: 0.0
      end: 272.0
      interpolation: "linear"
      keyframes:
        - {time: 0.0, value: 1.0}
        - {time: 49.9, value: 1.0}
        - {time: 50.0, value: 1.0}
        - {time: 56.0, value: 0.7}
        - {time: 61.9, value: 0.35}
        - {time: 63.0, value: 1.0}
        - {time: 69.0, value: 0.7}
        - {time: 74.9, value: 0.35}
        - {time: 76.0, value: 1.0}
        - {time: 82.0, value: 0.7}
        - {time: 87.9, value: 0.35}
        - {time: 89.0, value: 1.0}
        - {time: 95.0, value: 0.7}
        - {time: 100.9, value: 0.35}
        - {time: 102.0, value: 1.0}
        - {time: 108.0, value: 0.7}
        - {time: 113.9, value: 0.35}
        - {time: 115.0, value: 1.0}
        - {time: 121.0, value: 0.7}
        - {time: 126.9, value: 0.35}
        - {time: 128.0, value: 1.0}
        - {time: 134.0, value: 0.7}
        - {time: 139.9, value: 0.35}
        - {time: 141.0, value: 1.0}
        - {time: 147.0, value: 0.7}
        - {time: 152.9, value: 0.35}
        - {time: 154.0, value: 1.0}
        - {time: 160.0, value: 0.7}
        - {time: 165.9, value: 0.35}
        - {time: 167.0, value: 1.0}
        - {time: 173.0, value: 0.7}
        - {time: 178.9, value: 0.35}
        - {time: 180.0, value: 1.0}
        - {time: 186.0, value: 0.7}
        - {time: 191.9, value: 0.35}
        - {time: 193.0, value: 1.0}
        - {time: 199.0, value: 0.7}
        - {time: 204.9, value: 0.35}
        - {time: 206.0, value: 1.0}
        - {time: 212.0, value: 0.7}
        - {time: 217.9, value: 0.35}
        - {time: 219.0, value: 1.0}
        - {time: 225.0, value: 0.7}
        - {time: 230.9, value: 0.35}
        - {time: 232.0, value: 1.0}
        - {time: 238.0, value: 0.7}
        - {time: 243.9, value: 0.35}
        - {time: 245.0, value: 1.0}
        - {time: 251.0, value: 0.7}
        - {time: 256.9, value: 0.35}
        - {time: 258.0, value: 1.0}
        - {time: 264.0, value: 0.7}
        - {time: 269.9, value: 0.35}
        - {time: 272.0, value: 0.0}
    - id: "node8-relay-emphasis"
      target: {type: "digital_strip", id: "strip_42"}
      start: 0.0
      end: 272.0
      interpolation: "linear"
      keyframes:
        - {time: 0.0, value: 1.0}
        - {time: 49.9, value: 1.0}
        - {time: 50.0, value: 0.35}
        - {time: 56.0, value: 0.7}
        - {time: 61.9, value: 1.0}
        - {time: 63.0, value: 0.35}
        - {time: 69.0, value: 0.7}
        - {time: 74.9, value: 1.0}
        - {time: 76.0, value: 0.35}
        - {time: 82.0, value: 0.7}
        - {time: 87.9, value: 1.0}
        - {time: 89.0, value: 0.35}
        - {time: 95.0, value: 0.7}
        - {time: 100.9, value: 1.0}
        - {time: 102.0, value: 0.35}
        - {time: 108.0, value: 0.7}
        - {time: 113.9, value: 1.0}
        - {time: 115.0, value: 0.35}
        - {time: 121.0, value: 0.7}
        - {time: 126.9, value: 1.0}
        - {time: 128.0, value: 0.35}
        - {time: 134.0, value: 0.7}
        - {time: 139.9, value: 1.0}
        - {time: 141.0, value: 0.35}
        - {time: 147.0, value: 0.7}
        - {time: 152.9, value: 1.0}
        - {time: 154.0, value: 0.35}
        - {time: 160.0, value: 0.7}
