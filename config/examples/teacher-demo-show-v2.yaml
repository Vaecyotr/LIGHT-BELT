schema_version: 2

show:
  id: "teacher-demo-v2"
  duration: 300.0
  defaults:
    fade_in: 1.0
    fade_out: 1.0
    blend: "replace"
    min_effect_hold: 8.0
    switch_cooldown: 6.0

  cues:
    - id: "opening-screen-to-wall"
      start: 0.0
      end: 20.0
      priority: 10
      target:
        type: "virtual_path"
        id: "screen_to_wall"
      effect:
        mode: "fixed"
        id: "chase"
        params:
          speed: 9.0
          width: 6
          gap: 12
          color_source: "video"
      color:
        mode: "effect_default"
      origin: "start"
      transition:
        fade_in: 2.0
        fade_out: 2.0

    - id: "independent-ceiling-analog"
      start: 5.0
      end: 30.0
      priority: 5
      target:
        type: "analog_zone"
        id: "ceiling_left"
      effect:
        mode: "fixed"
        id: "breath"
        params:
          period: 5.0
      color:
        mode: "solid"
        color: [0.4, 0.2, 0.6]

    - id: "music-adaptive-wall-digital"
      start: 30.0
      end: 90.0
      priority: 10
      target:
        type: "digital_set"
        ids: ["wall_left", "wall_right"]
      effect:
        mode: "adaptive"
        allowed:
          silence: "calm"
          calm: "breath"
          flowing: "color_wave"
          ambient: "color_wave"
          rhythmic: "chase"
          energetic: "comet"
          impact: "comet"
          transition: "color_wave"
        fallback: "color_wave"
      color:
        mode: "palette"
        colors:
          - [0.2, 0.4, 0.8]
          - [0.8, 0.2, 0.4]
      audio_control:
        tempo_sync: "auto"
        tempo_confidence_min: 0.75
        beat_regularity_min: 0.70
        beats_per_cycle: 4.0
        speed_smoothing_seconds: 2.0
        state_confirmation_seconds: 1.5
        min_effect_hold: 8.0
        switch_cooldown: 6.0
